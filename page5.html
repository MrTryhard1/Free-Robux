<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Drawing App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #d7c3a3;
  overflow-x: hidden;
}

/* TOP BAR */
.topnav {
  background: #333;
  overflow: hidden;
}

.topnav a {
  float: left;
  color: white;
  padding: 14px;
  text-decoration: none;
}

.topnav a.active {
  background: #6b4f3a;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* TOOL PANEL */
.tools {
  width: 260px;
  background: #f2f2f2;
  padding: 15px;
  border-radius: 10px;
}

.tool-btn {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: white;
  border: 2px solid transparent;
}

.tool-btn.active {
  border: 2px solid black;
}

input[type="color"],
input[type="range"] {
  width: 100%;
}

/* CANVAS */
.canvas-wrap {
  position: relative;
  width: 700px;
  height: 400px;
  border: 4px solid #333;
  background: white;
  cursor: crosshair;
}

canvas {
  position: absolute;
}

/* WALL */
#wall {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  padding: 40px;
  justify-content: center;
  background: repeating-linear-gradient(
    90deg,
    #c8b08f,
    #c8b08f 40px,
    #b89c77 40px,
    #b89c77 80px
  );
}

/* ART */
.art {
  position: relative;
  background: #fff8e8;
  border: 5px solid black;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: transform 0.1s linear;
}

/* PIN */
.pin {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle at 30% 30%, #fff, #cc0000 40%, #6b0000);
  box-shadow: 0 3px 6px rgba(0,0,0,0.5);
  z-index: 10;
}

.pin::after {
  content: "";
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 18px;
  background: linear-gradient(#ddd, #888);
  border-radius: 2px;
}

/* IMAGE */
.art img {
  width: 260px;
  display: block;
}

/* USER */
.user {
  position: absolute;
  bottom: 5px;
  right: 8px;
  font-size: 10px;
  color: #444;
}
</style>
</head>

<body>

<div class="topnav">
  <a class="active">Drawing</a>
</div>

<div class="container">

  <div class="tools">
    <input type="color" id="color">

    <button class="tool-btn active" data-tool="brush">Brush</button>
    <button class="tool-btn" data-tool="eraser">Eraser</button>
    <button class="tool-btn" data-tool="bucket">Bucket</button>

    <label>Brush Size</label>
    <input type="range" id="brush" min="1" max="40" value="5">

    <label>Eraser Size</label>
    <input type="range" id="eraser" min="5" max="80" value="20">

    <button id="addLayer">+ Layer</button>
    <button id="post">Post</button>

    <div id="layers"></div>
  </div>

  <div class="canvas-wrap" id="wrap"></div>

</div>

<div id="wall"></div>

<script>
const CURRENT_USER = "MrTryhard1";
const WALL_KEY = "drawing_app_wall";

const wrap = document.getElementById("wrap");

let layers = [];
let active = 0;
let tool = "brush";
let layerCount = 1;

/* INIT */
function makeLayer(name) {
  const c = document.createElement("canvas");
  c.width = 700;
  c.height = 400;
  wrap.appendChild(c);
  layers.push({ canvas: c, name });
}

makeLayer("Layer 1");

/* TOOL SWITCH */
document.querySelectorAll(".tool-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tool-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    tool = btn.dataset.tool;
  };
});

/* DRAW */
let drawing = false;
let lastX, lastY;

wrap.addEventListener("mousedown", e => {
  drawing = true;
  const r = wrap.getBoundingClientRect();
  lastX = e.clientX - r.left;
  lastY = e.clientY - r.top;
});

wrap.addEventListener("mouseup", () => drawing = false);

wrap.addEventListener("mousemove", e => {
  if (!drawing) return;

  const ctx = layers[active].canvas.getContext("2d");
  const r = wrap.getBoundingClientRect();

  const x = e.clientX - r.left;
  const y = e.clientY - r.top;

  ctx.lineCap = "round";

  if (tool === "eraser") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.lineWidth = document.getElementById("eraser").value;
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = document.getElementById("color").value;
    ctx.lineWidth = document.getElementById("brush").value;
  }

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();

  lastX = x;
  lastY = y;
});

/* POST */
document.getElementById("post").onclick = () => {
  const final = document.createElement("canvas");
  final.width = 700;
  final.height = 400;
  const fctx = final.getContext("2d");

  layers.forEach(l => fctx.drawImage(l.canvas, 0, 0));

  const art = document.createElement("div");
  art.className = "art";

  const pin = document.createElement("div");
  pin.className = "pin";

  const img = document.createElement("img");
  img.src = final.toDataURL();

  const user = document.createElement("div");
  user.className = "user";
  user.textContent = CURRENT_USER;

  art.appendChild(pin);
  art.appendChild(img);
  art.appendChild(user);

  document.getElementById("wall").appendChild(art);

  localStorage.setItem(WALL_KEY, document.getElementById("wall").innerHTML);

  layers.forEach(l => {
    l.canvas.getContext("2d").clearRect(0, 0, 700, 400);
  });
};

/* SCROLL EFFECT */
let lastY = window.scrollY;
let sway = 0;

window.addEventListener("scroll", () => {
  const dy = window.scrollY - lastY;
  lastY = window.scrollY;

  sway += dy * 0.05;

  document.querySelectorAll(".art").forEach((el, i) => {
    const x = Math.sin(sway / 20 + i) * 6;
    el.style.transform = `translateX(${x}px) rotate(${x / 3}deg)`;
  });
});
</script>

</body>
</html>
